version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:build
    groups:
      actions:
        patterns:
          - '*'
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - '@types/*'
        update-types:
          - patch
          - minor
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - '@types/*'
        update-types:
          - patch
          - minor
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
    ignore:
      # electron majors are coordinated with native-module rebuilds; bump manually
      - dependency-name: 'electron'
        update-types:
          - 'version-update:semver-major'
      # TypeScript majors require tsconfig migration (moduleResolution etc.); do manually
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      # NestJS majors need coordinated migration across server/bot; bump manually
      - dependency-name: '@nestjs/*'
        update-types:
          - 'version-update:semver-major'
