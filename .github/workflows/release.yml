name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild
        required: true
        type: string

permissions:
  contents: write

env:
  # skip husky install on CI
  HUSKY: 0

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-2022
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Extract version and channel from tag
        id: version
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if echo "${VERSION}" | grep -qE '\-beta(\.|$)'; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          elif echo "${VERSION}" | grep -qE '\-alpha(\.|$)'; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync package.json versions for tag
        shell: bash
        run: bash ./scripts/set-version-ci.sh "${{ steps.version.outputs.version }}"

      - name: Setup
        uses: ./.github/actions/setup

      - run: pnpm build:packages

      - name: Build web frontend
        run: pnpm --filter @shiroani/web build

      - name: Build desktop app
        run: pnpm --filter @shiroani/desktop build
        env:
          # Public OAuth client IDs, baked into the bundle by esbuild
          # (see apps/desktop/esbuild.config.mjs). Set as repo secrets. Both are
          # public (PKCE / implicit grant) — no client secret ships in the build.
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}

      - name: Package macOS
        if: matrix.platform == 'mac'
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --publish never -c.publish.channel=${{ steps.version.outputs.channel }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Windows
        if: matrix.platform == 'win'
        shell: bash
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --publish never -c.publish.channel=${{ steps.version.outputs.channel }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v7
        with:
          name: macos-builds
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*-mac.yml
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v7
        with:
          name: windows-builds
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 30

  upload:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-builds
          path: artifacts/macos-builds

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-builds
          path: artifacts/windows-builds

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          fail_on_unmatched_files: true
          files: |
            artifacts/macos-builds/*.dmg
            artifacts/macos-builds/*-mac.yml
            artifacts/windows-builds/*.exe
            artifacts/windows-builds/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
