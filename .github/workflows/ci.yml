name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # skip husky install on CI
  HUSKY: 0

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' || steps.filter.outputs.desktop == 'true' || steps.filter.outputs.bot == 'true' }}
      web: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.web == 'true' }}
      desktop: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.desktop == 'true' }}
      bot: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.bot == 'true' }}
      landing: ${{ steps.filter.outputs.root == 'true' || steps.filter.outputs.ci == 'true' || steps.filter.outputs.shared == 'true' || steps.filter.outputs.landing == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'eslint.config.mjs'
              - '.prettierrc'
              - '.prettierignore'
            ci:
              - '.github/**'
              - 'scripts/set-version-ci.sh'
              - 'scripts/bump-version.mjs'
            shared:
              - 'packages/shared/**'
            web:
              - 'apps/web/**'
            desktop:
              - 'apps/desktop/**'
            bot:
              - 'apps/bot/**'
              - 'Dockerfile.bot'
              - 'docker-compose.yml'
            landing:
              - 'apps/landing/**'
              - 'packages/changelog/**'
              - 'Dockerfile.landing'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Type Check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Generate Prisma client
        run: pnpm --filter @shiroani/bot run db:generate

      - name: Type check
        run: pnpm typecheck

  test-web:
    name: Test Web
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Run web tests
        run: pnpm --filter @shiroani/web test

  check-locales:
    name: Check Locale Parity
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    # TODO: switch to hard-fail in Phase E (i18n-cleanup) once locale divergences close.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup
        with:
          install: 'false'

      - name: Check locale parity (advisory)
        run: pnpm check:locales

  test-desktop:
    name: Test Desktop
    needs: [changes]
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Run desktop tests
        run: pnpm --filter @shiroani/desktop test

  test-bot:
    name: Test Bot
    needs: [changes]
    if: needs.changes.outputs.bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Generate Prisma client
        run: pnpm --filter @shiroani/bot run db:generate

      - name: Run bot tests
        run: pnpm --filter @shiroani/bot test

  landing:
    name: Landing Check
    needs: [changes]
    if: needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build shared packages
        run: pnpm build:packages

      - name: Astro check
        run: pnpm --filter @shiroani/landing run check

      - name: Build landing site
        run: pnpm --filter @shiroani/landing run build

  ci-result:
    name: CI Result
    if: always()
    # check-locales is intentionally excluded — it's an advisory job (continue-on-error)
    # and shouldn't gate the rollup. Switch to hard-fail in Phase E once divergences close.
    needs: [lint, typecheck, test-web, test-desktop, test-bot, landing]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI outcome
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
