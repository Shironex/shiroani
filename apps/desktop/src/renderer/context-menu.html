<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"
    />
    <title>Menu</title>
    <style>
      :root {
        --menu-bg: rgba(20, 20, 30, 0.92);
        --menu-fg: #e8e8f0;
        --menu-primary: #ff6b8a;
        --menu-primary-rgb: 255, 107, 138;
        --menu-border: rgba(255, 107, 138, 0.3);
        --menu-destructive: #cc3355;
        --menu-muted: #a0a0b0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        font-family:
          'Segoe UI',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .menu {
        background: var(--menu-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--menu-border);
        border-radius: 12px;
        padding: 6px 0;
        min-width: 200px;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 0 16px rgba(255, 107, 138, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        opacity: 0;
        transform: scale(0.96) translateY(-4px);
        transition:
          opacity 120ms ease,
          transform 120ms ease;
      }

      .menu.show {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      .menu-item {
        display: flex;
        align-items: center;
        padding: 8px 14px;
        color: var(--menu-fg);
        font-size: 13px;
        cursor: pointer;
        transition: background 150ms ease;
        gap: 10px;
        position: relative;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
        outline: none;
      }

      .menu-item:hover,
      .menu-item:focus-visible {
        background: rgba(var(--menu-primary-rgb), 0.15);
      }

      .menu-item:active {
        background: rgba(var(--menu-primary-rgb), 0.25);
      }

      .menu-item .icon {
        width: 18px;
        text-align: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      .menu-item .label {
        flex: 1;
      }

      .menu-item .check {
        font-size: 12px;
        color: var(--menu-primary);
        opacity: 0;
        transition: opacity 150ms ease;
      }

      .menu-item .check.active {
        opacity: 1;
      }

      .separator {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 4px 10px;
      }

      .menu-item.quit .label {
        color: var(--menu-destructive);
      }

      .menu-item.quit:hover,
      .menu-item.quit:focus-visible {
        background: rgba(204, 51, 85, 0.15);
      }

      .menu-item.open-app .label {
        color: var(--menu-primary);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="menu" id="menu" role="menu">
      <button class="menu-item open-app" data-action="open-app" role="menuitem" tabindex="-1">
        <span class="icon">&#x1F4FA;</span>
        <span class="label">Otwórz ShiroAni</span>
      </button>
      <div class="separator" role="separator"></div>
      <button class="menu-item" data-action="navigate:schedule" role="menuitem" tabindex="-1">
        <span class="icon">&#x1F4C5;</span>
        <span class="label">Plan</span>
      </button>
      <button class="menu-item" data-action="navigate:library" role="menuitem" tabindex="-1">
        <span class="icon">&#x1F4DA;</span>
        <span class="label">Biblioteka</span>
      </button>
      <div class="separator" role="separator"></div>
      <button
        class="menu-item"
        data-action="lock-position"
        id="lockItem"
        role="menuitem"
        tabindex="-1"
      >
        <span class="icon">&#x1F512;</span>
        <span class="label">Zablokuj pozycję</span>
        <span class="check" id="lockCheck">&#x2713;</span>
      </button>
      <div class="separator" role="separator"></div>
      <button
        class="menu-item"
        data-action="toggle-visibility"
        id="visibilityItem"
        role="menuitem"
        tabindex="-1"
      >
        <span class="icon" id="visibilityIcon">&#x1F441;</span>
        <span class="label" id="visibilityLabel">Ukryj maskotkę</span>
      </button>
      <button class="menu-item" data-action="navigate:settings" role="menuitem" tabindex="-1">
        <span class="icon">&#x2699;</span>
        <span class="label">Ustawienia</span>
      </button>
      <div class="separator" role="separator"></div>
      <button class="menu-item quit" data-action="quit" role="menuitem" tabindex="-1">
        <span class="icon">&#x2715;</span>
        <span class="label">Zamknij</span>
      </button>
    </div>

    <script>
      (function () {
        var menu = document.getElementById('menu');
        var lockCheck = document.getElementById('lockCheck');
        var visibilityLabel = document.getElementById('visibilityLabel');
        var visibilityIcon = document.getElementById('visibilityIcon');

        var currentState = { visible: true, positionLocked: false };

        function getMenuItems() {
          return Array.from(menu.querySelectorAll('.menu-item'));
        }

        function focusItem(item) {
          if (item) item.focus();
        }

        function focusNextItem(current, direction) {
          var items = getMenuItems();
          var idx = items.indexOf(current);
          if (idx === -1) return;

          var next = idx;
          do {
            next = next + direction;
            if (next < 0) next = items.length - 1;
            if (next >= items.length) next = 0;
          } while (next !== idx && items[next].hasAttribute('data-skip'));

          focusItem(items[next]);
        }

        function applyTheme(theme) {
          if (!theme) return;
          var root = document.documentElement;
          if (theme.popover) root.style.setProperty('--menu-bg', theme.popover);
          if (theme.popoverForeground) root.style.setProperty('--menu-fg', theme.popoverForeground);
          if (theme.primary) root.style.setProperty('--menu-primary', theme.primary);
          if (theme.border) root.style.setProperty('--menu-border', theme.border);
          if (theme.destructive) root.style.setProperty('--menu-destructive', theme.destructive);
          if (theme.mutedForeground) root.style.setProperty('--menu-muted', theme.mutedForeground);
        }

        function updateUI(state) {
          currentState = state;

          if (state.positionLocked) {
            lockCheck.classList.add('active');
          } else {
            lockCheck.classList.remove('active');
          }

          if (state.visible) {
            visibilityLabel.textContent = 'Ukryj maskotkę';
            visibilityIcon.textContent = '\uD83D\uDC41';
          } else {
            visibilityLabel.textContent = 'Pokaż maskotkę';
            visibilityIcon.textContent = '\uD83D\uDE48';
          }

          applyTheme(state.theme);
        }

        function activateItem(item) {
          if (!item) return;
          var action = item.dataset.action;
          if (!action) return;

          if (action === 'toggle-visibility') {
            action = currentState.visible ? 'hide' : 'show';
          }

          window.menuAPI.selectItem(action);
        }

        window.menuAPI.onStateUpdate(function (state) {
          updateUI(state);
          requestAnimationFrame(function () {
            menu.classList.add('show');
            var items = getMenuItems();
            if (items.length > 0) focusItem(items[0]);
          });
        });

        window.menuAPI.onHide(function () {
          menu.classList.remove('show');
          menu.addEventListener(
            'transitionend',
            function () {
              window.menuAPI.hidden();
            },
            { once: true }
          );
        });

        menu.addEventListener('click', function (e) {
          var item = e.target.closest('.menu-item');
          if (!item) return;
          activateItem(item);
        });

        menu.addEventListener('keydown', function (e) {
          var target = e.target.closest('.menu-item');
          switch (e.key) {
            case 'ArrowDown':
              e.preventDefault();
              if (target) {
                focusNextItem(target, 1);
              } else {
                var items = getMenuItems();
                if (items.length > 0) focusItem(items[0]);
              }
              break;
            case 'ArrowUp':
              e.preventDefault();
              if (target) {
                focusNextItem(target, -1);
              } else {
                var items = getMenuItems();
                if (items.length > 0) focusItem(items[items.length - 1]);
              }
              break;
            case 'Home':
              e.preventDefault();
              var items = getMenuItems();
              if (items.length > 0) focusItem(items[0]);
              break;
            case 'End':
              e.preventDefault();
              var items = getMenuItems();
              if (items.length > 0) focusItem(items[items.length - 1]);
              break;
            case 'Enter':
            case ' ':
              e.preventDefault();
              if (target) activateItem(target);
              break;
            case 'Escape':
              e.preventDefault();
              window.menuAPI.dismiss();
              break;
          }
        });

        window.menuAPI.ready();
      })();
    </script>
  </body>
</html>
